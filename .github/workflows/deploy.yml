name: Build and Deploy Github_Gists

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Tag for the Docker image'
        required: true
        default: ""
      host_port:
        description: 'Host port to map to the container'
        required: false
        default: "8080"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: github-gists-api
  CONTAINER_NAME: github-gists-container
  CONTAINER_PORT: 8080

jobs:
  build-and-push:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Verify Docker
        shell: powershell
        run: |
          if (-not (Get-Command docker -ErrorAction SilentlyContinue)) {
            Write-Error "Docker is not installed or not in PATH."
            exit 1
          } else {
            Write-Host "Docker is available: $(docker --version)"
          }
      
      - name: Build Docker image
        shell: powershell
        run: |
          $container = docker ps -aq --filter "name=$env:CONTAINER_NAME:$env:IMAGE_TAG"
          if ($container) {
            Write-Host "Stopping and removing existing container: $env:CONTAINER_NAME"
            docker stop $container | Out-Null
            docker rm $container | Out-Null
          } else {
            Write-Host "No existing container named $env:CONTAINER_NAME found."
          }

      - name: Run Docker container
        shell: powershell
        run: |
          docker run -d `
           --name $env:CONTAINER_NAME `
           -p $env:HOST_PORT:$env:CONTAINER_PORT `
           $env:IMAGE_NAME:$env:IMAGE_TAG
          Write-Host "Container $env:CONTAINER_NAME is running on port $env:HOST_PORT"

      - name: Verify application is running
        shell: powershell
        run: |
          Start-Sleep -Seconds 10
          try {
            $response = Invoke-WebRequest -Uri "http://localhost:$env:HOST_PORT" -UseBasicParsing
            if ($response.StatusCode -eq 200) {
              Write-Host "Application is running successfully."
            } else {
              Write-Error "Application returned status code: $($response.StatusCode)"
              exit 1
            }
          } catch {
            Write-Error "Failed to connect to the application: $_"
            exit 1
          }
      